      <text x="543" y="1552" text-anchor="start" font-size="15" font-weight="500" fill="#334155"><tspan x="543" dy="0">Attach drains exactly one declared</tspan><tspan x="543" dy="19">braid/thread/session slice into SQLite.</tspan></text>
    </g>
  

    <g>

  <text x="1667.5" y="375" class="node-sub">browse, search, review</text>
  <text x="1667.5" y="398" class="node-sub">checkpoint projections</text>

  <rect x="1365" y="458" width="310" height="70" rx="13" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="1520" y="487" class="node-title">Authentication / Token Exchange</text>
  <text x="1520" y="512" class="node-sub">authorizes CLI and regional Git access</text>

  <!-- Remote Git and data plane -->

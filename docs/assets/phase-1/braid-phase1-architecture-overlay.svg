  <text x="767.5" y="488" class="node-title">Recorder Daemon</text>
  <text x="767.5" y="510" class="node-sub">Phase 1 orchestrator + review backend</text>

  <rect x="605" y="605" width="225" height="82" rx="14" class="node-store status-existing"/>
  <text x="717.5" y="640" class="node-title">Inbox / FileStore</text>
  <text x="717.5" y="665" class="node-sub">pre-attach capture</text>

  <path d="M910,615 C910,602 1110,602 1110,615 L1110,675 C1110,688 910,688 910,675 Z" class="node-store status-partial"/>
  <path d="M910,615 C910,628 1110,628 1110,615" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1010" y="647" class="node-title">Local SQLite</text>
  <text x="1010" y="672" class="node-sub">daemon DB + migrations</text>

  <rect x="742" y="760" width="270" height="82" rx="14" class="node-worker status-later"/>
  <text x="877" y="795" class="node-title">Sync / Drain Worker</text>
  <text x="877" y="820" class="node-sub">remote split after Phase 1</text>

  <rect x="742" y="885" width="270" height="70" rx="14" class="node-git status-partial"/>
  <text x="877" y="916" class="node-title">Local Git Notes</text>
  <text x="877" y="940" class="node-sub">finalize format + daemon write</text>


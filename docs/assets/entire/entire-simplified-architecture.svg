  <!-- Architecture constraints -->
  <rect x="70" y="1070" width="1760" height="140" rx="16" class="footer"/>
  <text x="100" y="1104" class="note-title">Boundaries and ownership</text>
  <text x="100" y="1131" class="note">Agent hooks invoke the Entire CLI directly. The CLI records active sessions, writes shadow checkpoints, condenses permanent checkpoints, and coordinates Git push/fetch.</text>
  <text x="100" y="1156" class="note">Code and session context share Git's object model but use separate refs. Commit trailers link code commits to checkpoint IDs without putting transcripts on the working branch.</text>
  <text x="100" y="1181" class="note">Entire owns its control plane, regional Git APIs, mirror workers, and regional storage. GitHub owns the upstream repository, PR records, and any refs stored on GitHub.</text>
  <text x="100" y="1203" class="note">Entire Web/API is a presentation and query layer over Git-linked checkpoint context. The hosted Git backend is publicly described but not yet open sourced.</text>
</svg>

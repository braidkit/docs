  <rect x="1335" y="285" width="230" height="92" rx="15" class="node-orch status-later"/>
  <text x="1450" y="323" class="node-title">Orchestrator</text>
  <text x="1450" y="348" class="node-sub">separate remote authority later</text>

  <path d="M1335,470 C1335,456 1565,456 1565,470 L1565,555 C1565,569 1335,569 1335,555 Z" class="node-store status-later"/>
  <path d="M1335,470 C1335,484 1565,484 1565,470" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="1450" y="506" class="node-title">Intent DB</text>
  <text x="1450" y="531" class="node-sub">events, braids, SHAs</text>


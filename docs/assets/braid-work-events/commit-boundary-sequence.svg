      <text x="1004" y="1552" text-anchor="start" font-size="15" font-weight="500" fill="#334155"><tspan x="1004" dy="0">Scope guard rejects off-scope events and binds</tspan><tspan x="1004" dy="19">every note to a commit SHA.</tspan></text>
    </g>
  

    <g>
      <rect x="1447" y="1490" width="430" height="120" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>

site_name: Braid Docs
site_url: https://docs.braidkit.io/
site_description: Protocol and product docs for Braid — the accountability layer for software work across humans and agents.
repo_url: https://github.com/braidkit/docs
repo_name: braidkit/docs

theme:
  name: material
  custom_dir: overrides
  logo: assets/brand/logo/braid-mark-purple-512.png
  favicon: assets/brand/logo/braid-avatar-purple-512.png
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  palette:
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

extra_css:
  - stylesheets/brand.css

extra_javascript:
  - javascripts/diagrams.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Getting Started:
      - Introduction: getting-started/introduction.md
      - Quickstart: getting-started/quickstart.md
      - Concepts at a Glance: getting-started/concepts-at-a-glance.md
  - Concepts:
      - Braids: concepts/braids.md
      - Threads: concepts/threads.md
      - Contributors: concepts/contributors.md
      - Events: concepts/events.md
      - Reviews: concepts/reviews.md
      - Decisions: concepts/decisions.md
  - Protocol:
      - Overview: protocol/overview.md
      - Entity Relations: protocol/entity-relations.md
      - WorkEvent Reference: protocol/work-event.md
      - Event Stories: protocol/event-stories.md
      - Capture & Provenance: protocol/capture-and-provenance.md
  - Walkthroughs:
      - Human Thread: stories/human-thread.md
      - Agent Thread: stories/agent-thread.md
      - Sub-Agent Delegation: stories/sub-agent-delegation.md
      - Review and Promote: stories/review-and-promote.md
  - Reference:
      - Payload Kinds: reference/payload-kinds.md
      - Glossary: reference/glossary.md
      - FAQ: reference/faq.md
  - Operations:
      - Phase 1 Scope: phase-1-scope.md
      - Keeping Docs Current: keeping-docs-current.md
      - Deploying: deploying.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/braidkit
      name: Braid on GitHub
  generator: false

      <text x="1465" y="1552" text-anchor="start" font-size="15" font-weight="500" fill="#334155"><tspan x="1465" dy="0">Note generation or git-notes write failure</tspan><tspan x="1465" dy="19">leaves SQLite truth retryable.</tspan></text>
    </g>
  

    <g>
      <rect x="1908" y="1490" width="430" height="120" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>

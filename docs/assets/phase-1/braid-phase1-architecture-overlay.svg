  <path d="M1012,920 C1160,968 1360,952 1505,890" class="line"/>
  <rect x="1235" y="926" width="132" height="26" rx="6" class="label-bg"/>
  <text x="1301" y="944" class="label">push refs</text>

  <!-- Important constraints -->
  <rect x="70" y="1000" width="1655" height="112" rx="16" class="footer"/>
  <text x="100" y="1032" class="note-title">Phase 1 boundary</text>
  <text x="100" y="1058" class="note">The existing orchestrator is deployed locally as the Braid daemon and owns SQLite, lifecycle queries, and the Developer Review backend.</text>
  <text x="100" y="1080" class="note">Phase 1 completes Claude/Codex support, the issue #24 command surface, installation packages, review UI, and pushed Git notes.</text>
  <text x="100" y="1102" class="note">Hooks, Braid Skills, platform coverage, Git-note policy, review design, and nudges remain explicit product decisions.</text>

  <!-- Mini legend -->
  <rect x="1230" y="582" width="470" height="52" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.1"/>
  <circle cx="1252" cy="607" r="9" class="badge"/>
  <text x="1252" y="612" class="badge-text">1</text>
  <text x="1270" y="604" class="small">Phase 1 keeps authority and persistence local.</text>
  <text x="1270" y="626" class="small">Remote Orchestrator and Intent DB remain later architecture.</text>
</svg>

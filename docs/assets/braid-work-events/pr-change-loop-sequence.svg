<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="2300" viewBox="0 0 3600 2300">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 46px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #475569; }
      .actor-title { font: 700 18px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .actor-sub { font: 400 14px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .phase-title { font: 700 27px Arial, sans-serif; fill: #0f172a; }
      .phase-sub { font: 400 18px Arial, sans-serif; fill: #475569; }
      .msg { font: 700 15px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .note-title { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .note { font: 400 18px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 15px Arial, sans-serif; fill: #475569; }
      .mono { font: 400 16px Menlo, Consolas, monospace; fill: #334155; }
      .actor-dev { fill: #f1f5f9; stroke: #64748b; stroke-width: 3; }
      .actor-agent { fill: #e0f2fe; stroke: #0284c7; stroke-width: 3; }
      .actor-hook { fill: #fef3c7; stroke: #d97706; stroke-width: 3; }
      .actor-cli { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; }
      .actor-daemon { fill: #eef2ff; stroke: #4f46e5; stroke-width: 3; }
      .actor-db { fill: #f0fdf4; stroke: #16a34a; stroke-width: 3; }
      .actor-orch { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 3; }
      .actor-skill { fill: #fae8ff; stroke: #a21caf; stroke-width: 3; }
      .actor-git { fill: #fff7ed; stroke: #ea580c; stroke-width: 3; }
      .lifeline { stroke: #cbd5e1; stroke-width: 3; stroke-dasharray: 9 9; }
      .line { stroke: #334155; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .seq { fill: #0f766e; stroke: #ffffff; stroke-width: 3; }
      .seq-text { font: 700 13px Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .boundary { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .loop { fill: #ffffff; fill-opacity: .74; stroke: #7c3aed; stroke-width: 3; stroke-dasharray: 12 9; }
      .callout { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; }
    </style>
  </defs>

  <rect width="3600" height="2300" fill="#ffffff"/>

  <text x="80" y="76" class="title">PR Change Loop: Changed Intent Capture</text>
  <text x="80" y="120" class="subtitle">After a PR exists, Intent DB is the source of truth. Every PR change becomes an append-only changed-intent delta before merge.</text>

  <!-- Actor header -->
  <rect x="60" y="170" width="210" height="82" rx="12" class="actor-dev"/>
  <text x="165" y="204" class="actor-title">Developer / Agent</text>
  <text x="165" y="230" class="actor-sub">changes PR</text>

  <rect x="365" y="170" width="210" height="82" rx="12" class="actor-agent"/>
  <text x="470" y="204" class="actor-title">GitHub PR</text>
  <text x="470" y="230" class="actor-sub">review surface</text>

  <rect x="670" y="170" width="210" height="82" rx="12" class="actor-hook"/>
  <text x="775" y="204" class="actor-title">Hooks</text>
  <text x="775" y="230" class="actor-sub">webhook / lifecycle</text>

  <rect x="975" y="170" width="210" height="82" rx="12" class="actor-cli"/>
  <text x="1080" y="204" class="actor-title">Braid CLI</text>
  <text x="1080" y="230" class="actor-sub">work-event client</text>

  <rect x="1260" y="170" width="250" height="82" rx="12" class="actor-daemon"/>
  <text x="1385" y="204" class="actor-title">Local Braid Daemon</text>
  <text x="1385" y="230" class="actor-sub">validate + route</text>

  <rect x="1585" y="170" width="230" height="82" rx="12" class="actor-db"/>
  <text x="1700" y="204" class="actor-title">Local SQLite</text>
  <text x="1700" y="230" class="actor-sub">local cache only</text>

  <rect x="1905" y="170" width="230" height="82" rx="12" class="actor-orch"/>
  <text x="2020" y="204" class="actor-title">Orchestrator</text>
  <text x="2020" y="230" class="actor-sub">remote authority</text>

  <rect x="2225" y="170" width="230" height="82" rx="12" class="actor-db"/>
  <text x="2340" y="204" class="actor-title">Intent DB</text>
  <text x="2340" y="230" class="actor-sub">source of truth</text>

  <rect x="2525" y="170" width="270" height="82" rx="12" class="actor-skill"/>
  <text x="2660" y="204" class="actor-title">Braid Git Note Skill</text>
  <text x="2660" y="230" class="actor-sub">synthesize note</text>

  <rect x="2835" y="170" width="230" height="82" rx="12" class="actor-git"/>
  <text x="2950" y="204" class="actor-title">Git Repo</text>
  <text x="2950" y="230" class="actor-sub">PR/head notes</text>

  <!-- Lifelines -->
  <line x1="165" y1="275" x2="165" y2="2090" class="lifeline"/>
  <line x1="470" y1="275" x2="470" y2="2090" class="lifeline"/>
  <line x1="775" y1="275" x2="775" y2="2090" class="lifeline"/>
  <line x1="1080" y1="275" x2="1080" y2="2090" class="lifeline"/>
  <line x1="1385" y1="275" x2="1385" y2="2090" class="lifeline"/>
  <line x1="1700" y1="275" x2="1700" y2="2090" class="lifeline"/>
  <line x1="2020" y1="275" x2="2020" y2="2090" class="lifeline"/>
  <line x1="2340" y1="275" x2="2340" y2="2090" class="lifeline"/>
  <line x1="2660" y1="275" x2="2660" y2="2090" class="lifeline"/>
  <line x1="2950" y1="275" x2="2950" y2="2090" class="lifeline"/>

  <!-- Boundary statement -->
  <rect x="60" y="305" width="3005" height="116" rx="14" class="boundary"/>
  <text x="92" y="346" class="phase-title">Precondition</text>
  <text x="92" y="382" class="phase-sub">PR has already been raised. Intent DB owns the durable braid projection; SQLite is only a local cache/buffer for new PR-loop events.</text>

  <!-- Loop frame -->
  <rect x="60" y="465" width="3005" height="940" rx="18" class="loop"/>
  <text x="92" y="508" class="phase-title">Loop: repeat for every PR change before merge</text>
  <text x="92" y="540" class="phase-sub">Covers pushed commits, force-push/rebase, PR body edits, comments, review replies, and goal/scope changes by either agent or developer.</text>

  <!-- Sequence -->
  <line x1="165" y1="610" x2="470" y2="610" class="line"/>
  <circle cx="300" cy="610" r="17" class="seq"/><text x="300" y="615" class="seq-text">01</text>
  <rect x="312" y="570" width="190" height="28" rx="6" class="label-bg"/><text x="407" y="590" class="msg">change PR</text>

  <line x1="470" y1="670" x2="775" y2="670" class="line"/>
  <circle cx="610" cy="670" r="17" class="seq"/><text x="610" y="675" class="seq-text">02</text>
  <rect x="625" y="630" width="190" height="28" rx="6" class="label-bg"/><text x="720" y="650" class="msg">pr.changed</text>

  <line x1="775" y1="730" x2="1080" y2="730" class="line"/>
  <circle cx="915" cy="730" r="17" class="seq"/><text x="915" y="735" class="seq-text">03</text>
  <rect x="930" y="690" width="170" height="28" rx="6" class="label-bg"/><text x="1015" y="710" class="msg">call Braid CLI</text>

  <line x1="1080" y1="790" x2="1385" y2="790" class="line"/>
  <circle cx="1220" cy="790" r="17" class="seq"/><text x="1220" y="795" class="seq-text">04</text>
  <rect x="1235" y="750" width="232" height="28" rx="6" class="label-bg"/><text x="1351" y="770" class="msg">WorkEvent + key</text>

  <line x1="1385" y1="850" x2="1700" y2="850" class="line"/>
  <circle cx="1530" cy="850" r="17" class="seq"/><text x="1530" y="855" class="seq-text">05</text>
  <rect x="1545" y="810" width="212" height="28" rx="6" class="label-bg"/><text x="1651" y="830" class="msg">cache local delta</text>

  <line x1="1385" y1="930" x2="2020" y2="930" class="line"/>
  <circle cx="1685" cy="930" r="17" class="seq"/><text x="1685" y="935" class="seq-text">06</text>
  <rect x="1685" y="890" width="380" height="28" rx="6" class="label-bg"/><text x="1875" y="910" class="msg">drain delta + SHAs + version</text>

  <line x1="2020" y1="990" x2="2340" y2="990" class="line"/>
  <circle cx="2165" cy="990" r="17" class="seq"/><text x="2165" y="995" class="seq-text">07</text>
  <rect x="2150" y="950" width="348" height="28" rx="6" class="label-bg"/><text x="2324" y="970" class="msg">dedupe; apply vN -> vN+1</text>

  <line x1="2340" y1="1050" x2="2020" y2="1050" class="return"/>
  <circle cx="2185" cy="1050" r="17" class="seq"/><text x="2185" y="1055" class="seq-text">08</text>
  <rect x="2198" y="1010" width="175" height="28" rx="6" class="label-bg"/><text x="2285" y="1030" class="msg">URI + digest</text>

  <line x1="2020" y1="1110" x2="1385" y2="1110" class="return"/>
  <circle cx="1700" cy="1110" r="17" class="seq"/><text x="1700" y="1115" class="seq-text">09</text>
  <rect x="1715" y="1070" width="230" height="28" rx="6" class="label-bg"/><text x="1830" y="1090" class="msg">durable pointer</text>

  <line x1="1385" y1="1190" x2="2340" y2="1190" class="line"/>
  <circle cx="1810" cy="1190" r="17" class="seq"/><text x="1810" y="1195" class="seq-text">10</text>
  <rect x="1830" y="1150" width="325" height="28" rx="6" class="label-bg"/><text x="1992" y="1170" class="msg">query current projection vN+1</text>

  <line x1="2340" y1="1250" x2="1385" y2="1250" class="return"/>
  <circle cx="1810" cy="1250" r="17" class="seq"/><text x="1810" y="1255" class="seq-text">11</text>
  <rect x="1828" y="1210" width="260" height="28" rx="6" class="label-bg"/><text x="1958" y="1230" class="msg">projection slice</text>

  <line x1="1385" y1="1310" x2="2660" y2="1310" class="line"/>
  <circle cx="2010" cy="1310" r="17" class="seq"/><text x="2010" y="1315" class="seq-text">12</text>
  <rect x="2030" y="1270" width="250" height="28" rx="6" class="label-bg"/><text x="2155" y="1290" class="msg">synthesize PR/head note</text>

  <line x1="2660" y1="1370" x2="1385" y2="1370" class="return"/>
  <circle cx="2010" cy="1370" r="17" class="seq"/><text x="2010" y="1375" class="seq-text">13</text>
  <rect x="2028" y="1330" width="190" height="28" rx="6" class="label-bg"/><text x="2123" y="1350" class="msg">PR/head note</text>

  <line x1="1385" y1="1430" x2="2950" y2="1430" class="line"/>
  <circle cx="2145" cy="1430" r="17" class="seq"/><text x="2145" y="1435" class="seq-text">14</text>
  <rect x="2138" y="1390" width="424" height="28" rx="6" class="label-bg"/><text x="2350" y="1410" class="msg">write PR note @ head SHA (projection)</text>

  <line x1="1385" y1="1490" x2="470" y2="1490" class="line"/>
  <circle cx="905" cy="1490" r="17" class="seq"/><text x="905" y="1495" class="seq-text">15</text>
  <rect x="925" y="1450" width="305" height="28" rx="6" class="label-bg"/><text x="1078" y="1470" class="msg">update PR summary/comment</text>

  <line x1="2950" y1="1550" x2="470" y2="1550" class="line"/>
  <circle cx="1700" cy="1550" r="17" class="seq"/><text x="1700" y="1555" class="seq-text">16</text>
  <rect x="1722" y="1510" width="235" height="28" rx="6" class="label-bg"/><text x="1839" y="1530" class="msg">push PR note refs</text>

  <!-- Callouts -->
  <rect x="90" y="1605" width="920" height="170" rx="14" class="warn"/>
  <text x="122" y="1643" class="note-title">Changed-intent delta</text>
  <text x="122" y="1676" class="note">Append-only event with `pr_id`, previous/current head SHA, changed field, reason,</text>
  <text x="122" y="1706" class="note">event range, actor, timestamp, digest, and `projection_version`.</text>
  <text x="122" y="1736" class="note">Do not overwrite earlier intent.</text>

  <rect x="1080" y="1605" width="900" height="170" rx="14" class="callout"/>
  <text x="1112" y="1643" class="note-title">Idempotency + ordering</text>
  <text x="1112" y="1676" class="note">Dedupe by provider event id, PR id, event type, head SHA, and digest.</text>
  <text x="1112" y="1706" class="note">Apply deltas through a versioned projection: `vN -> vN+1`.</text>
  <text x="1112" y="1736" class="note">Out-of-order events wait or replay against the latest projection.</text>

  <rect x="2050" y="1605" width="1015" height="170" rx="14" class="actor-git"/>
  <text x="2082" y="1643" class="note-title">PR/head git note namespace</text>
  <text x="2082" y="1676" class="mono">refs/notes/agent-pr</text>
  <text x="2082" y="1706" class="note">Attached to current PR head SHA; note body includes PR id / URL and Intent DB pointer.</text>
  <text x="2082" y="1736" class="note">Git notes and PR summaries are projections; Intent DB remains authoritative.</text>

  <rect x="90" y="1810" width="920" height="170" rx="14" class="callout"/>
  <text x="122" y="1848" class="note-title">Force-push / rebase</text>
  <text x="122" y="1881" class="note">Record `old_head_sha -> new_head_sha` and reason.</text>
  <text x="122" y="1911" class="note">Older PR/head notes remain historical; Intent DB points to current head.</text>
  <text x="122" y="1941" class="note">Regenerate the current PR/head projection note on the new SHA.</text>

  <rect x="1080" y="1810" width="900" height="170" rx="14" class="warn"/>
  <text x="1112" y="1848" class="note-title">Failure policy</text>
  <text x="1112" y="1881" class="note">Intent DB write is required. PR summary and git-note writes are retryable projections.</text>
  <text x="1112" y="1911" class="note">Track note status: `pending | written | pushed | failed`.</text>
  <text x="1112" y="1941" class="note">A note failure must not erase or block durable intent.</text>

  <rect x="2050" y="1810" width="1015" height="170" rx="14" class="callout"/>
  <text x="2082" y="1848" class="note-title">Merge race guard</text>
  <text x="2082" y="1881" class="note">Before promote: drain final delta, lock/finalize PR projection, then query Intent DB.</text>
  <text x="2082" y="1911" class="note">If the PR changes while merge starts, serialize through projection version.</text>
  <text x="2082" y="1941" class="note">Closed-unmerged PRs become `abandoned` or `superseded`, not promoted.</text>

  <rect x="60" y="2045" width="3005" height="78" rx="12" class="boundary"/>
  <text x="92" y="2083" class="note">After PR creation, GitHub and SQLite are inputs. Intent DB is truth. Git notes and PR summaries are projections that can be regenerated from Intent DB.</text>
</svg>

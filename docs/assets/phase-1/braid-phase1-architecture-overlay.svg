  <rect x="1265" y="820" width="210" height="88" rx="15" class="node-gh status-external"/>
  <text x="1370" y="856" class="node-title">PR / Merge</text>
  <text x="1370" y="881" class="node-sub">GitHub boundary</text>

  <rect x="1505" y="820" width="210" height="88" rx="15" class="node-git status-phase1"/>
  <text x="1610" y="856" class="node-title">Remote Git Notes</text>
  <text x="1610" y="881" class="node-sub">push refs with retry policy</text>


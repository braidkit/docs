      .note { font: 400 15px Arial, sans-serif; fill: #334155; }
      .mono { font: 400 14px Menlo, Consolas, monospace; fill: #334155; }
      .zone-local { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .zone-remote { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .zone-github { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.5; }
      .agent-box { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.4; }
      .node-user { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; }
      .node-agent { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .node-hook { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .node-skill { fill: #fae8ff; stroke: #a21caf; stroke-width: 1.5; }
      .node-cli { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; }
      .node-daemon { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; }
      .node-store { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; }
      .node-worker { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; }
      .node-git { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.5; }
      .node-orch { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
      .node-gh { fill: #f8fafc; stroke: #0f172a; stroke-width: 1.5; }
      .line { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #64748b; stroke-width: 1.6; fill: none; marker-end: url(#arrow-muted); }
      .return-line { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow-muted); }
      .label-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 0.8; }
      .footer { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .badge { fill: #64748b; }
      .badge-text { font: 700 13px Arial, sans-serif; fill: #ffffff; text-anchor: middle; }
      .status-existing { fill: #dcfce7; stroke: #15803d; stroke-width: 1.8; }
      .status-partial { fill: #fef3c7; stroke: #ca8a04; stroke-width: 1.8; }
      .status-phase1 { fill: #ffedd5; stroke: #ea580c; stroke-width: 1.8; }
      .status-open { fill: #f3e8ff; stroke: #9333ea; stroke-width: 1.8; stroke-dasharray: 8 6; }
      .status-later { fill: #e2e8f0; stroke: #64748b; stroke-width: 1.8; }
      .status-external { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.8; }
      .legend-text { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .status-pill { font: 700 12px Arial, sans-serif; text-anchor: middle; }
      .phase1-pill { fill: #ea580c; }
      .open-pill { fill: #9333ea; }
      .later-pill { fill: #64748b; }
      .existing-pill { fill: #15803d; }
      .pill-text { font: 700 11px Arial, sans-serif; fill: #ffffff; text-anchor: middle; }

<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1160" viewBox="0 0 1800 1160" role="img" aria-labelledby="title desc">
  <title id="title">Braid Phase 1 architecture implementation overlay</title>
  <desc id="desc">The Braid target architecture colored by existing foundation, Phase 1 implementation, open decisions, later architecture, and external components.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 42px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #475569; }
      .zone-title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .zone-sub { font: 400 17px Arial, sans-serif; fill: #475569; }
      .node-title { font: 700 15px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .node-sub { font: 400 15px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .label { font: 700 14px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }

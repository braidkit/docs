  <rect class="bg" width="1900" height="1260"/>

  <text x="60" y="68" class="title">Entire Simplified Architecture</text>
  <text x="60" y="106" class="subtitle">Agent session capture is Git-native locally; the hosted platform distributes and presents the same code and checkpoint objects.</text>

  <!-- Legend -->
  <rect x="60" y="126" width="1780" height="48" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="92" y1="150" x2="138" y2="150" class="legend-capture"/>
  <text x="151" y="155" class="small">session capture / checkpoint flow</text>
  <line x1="430" y1="150" x2="476" y2="150" class="legend-code"/>
  <text x="489" y="155" class="small">normal Git code flow</text>
  <line x1="740" y1="150" x2="786" y2="150" class="legend-hosted"/>
  <text x="799" y="155" class="small">Entire hosted control / read flow</text>
  <line x1="1160" y1="150" x2="1206" y2="150" class="legend-mirror"/>
  <text x="1219" y="155" class="small">Git mirror / replication flow</text>
  <rect x="1460" y="138" width="18" height="18" rx="4" class="owner-entire"/>
  <text x="1488" y="154" class="small">Entire-owned</text>
  <rect x="1645" y="138" width="18" height="18" rx="4" class="owner-github"/>
  <text x="1673" y="154" class="small">GitHub-owned</text>

  <!-- Zones -->
  <rect x="50" y="195" width="1100" height="850" rx="22" class="zone-local"/>
  <text x="85" y="238" class="zone-title">Local Dev Box</text>
  <text x="85" y="265" class="zone-sub">Entire CLI owns capture, checkpoint construction, rewind/resume, and Git synchronization. No local daemon or SQLite event store.</text>

  <rect x="1195" y="195" width="650" height="365" rx="22" class="zone-cloud"/>
  <text x="1230" y="238" class="zone-title">Entire Hosted Platform</text>
  <text x="1230" y="265" class="zone-sub">Global coordination and user-facing projections.</text>
  <text x="1230" y="287" class="zone-sub">Repository content is not stored in the control plane.</text>
  <rect x="1640" y="215" width="165" height="27" rx="7" class="owner-entire"/>
  <text x="1722.5" y="234" class="owner-label">ENTIRE-OPERATED</text>

  <rect x="1195" y="595" width="650" height="450" rx="22" class="zone-git"/>
  <text x="1230" y="638" class="zone-title">Entire Distributed Git Data Plane</text>
  <text x="1230" y="665" class="zone-sub">GitHub remains the origin; Entire fans code and checkpoint Git objects</text>
  <text x="1230" y="687" class="zone-sub">into independent regional mirrors. Three example regions are shown.</text>

  <!-- Local: user and runtime -->
  <rect x="90" y="305" width="185" height="82" rx="14" class="node-user"/>
  <text x="182.5" y="341" class="node-title">Developer</text>
  <text x="182.5" y="366" class="node-sub">works normally</text>

  <rect x="90" y="430" width="430" height="280" rx="18" class="agent-box"/>
  <text x="122" y="469" class="zone-title">Agent Runtime</text>
  <text x="122" y="494" class="zone-sub">Supported coding agents and subagents</text>

  <rect x="125" y="525" width="170" height="78" rx="13" class="node-agent"/>
  <text x="210" y="560" class="node-title">Agent Session</text>
  <text x="210" y="585" class="node-sub">agent + subagents</text>

  <rect x="330" y="525" width="155" height="78" rx="13" class="node-hook"/>
  <text x="407.5" y="560" class="node-title">Agent Hooks</text>
  <text x="407.5" y="585" class="node-sub">lifecycle adapters</text>

  <rect x="195" y="625" width="220" height="62" rx="13" class="node-skill"/>
  <text x="305" y="653" class="node-title">Entire Skills</text>
  <text x="305" y="676" class="node-sub">search, explain, handoff</text>

  <!-- Local: CLI and stores -->
  <rect x="630" y="305" width="230" height="88" rx="15" class="node-cli"/>
  <text x="745" y="342" class="node-title">Entire CLI</text>
  <text x="745" y="368" class="node-sub">recorder + Git coordinator</text>


  <text x="1372.5" y="350" class="node-title">Global Control Plane</text>
  <text x="1372.5" y="375" class="node-sub">identity, access, placement</text>
  <text x="1372.5" y="398" class="node-sub">regional selection</text>

  <rect x="1540" y="315" width="255" height="105" rx="15" class="node-web"/>

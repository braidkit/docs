  <text x="715" y="650" class="node-title">Code Commits</text>
  <text x="715" y="675" class="node-sub">normal working branch</text>
  <text x="715" y="696" class="mono">Entire-Checkpoint trailer</text>

  <rect x="865" y="605" width="240" height="108" rx="14" class="node-checkpoint"/>
  <text x="985" y="638" class="node-title">Checkpoint Git Store</text>
  <text x="985" y="663" class="node-sub">transcripts, prompts, attribution</text>
  <text x="985" y="685" class="mono">entire/checkpoints/v1</text>
  <text x="985" y="705" class="mono">or refs/entire/checkpoints/*</text>

  <rect x="625" y="805" width="225" height="88" rx="14" class="node-helper"/>
  <text x="737.5" y="840" class="node-title">Git Client</text>
  <text x="737.5" y="865" class="node-sub">commit, push, fetch</text>

  <rect x="885" y="805" width="220" height="88" rx="14" class="node-helper"/>
  <text x="995" y="840" class="node-title">git-remote-entire</text>
  <text x="995" y="865" class="node-sub">handles entire:// remotes</text>

  <rect x="625" y="940" width="480" height="70" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="865" y="970" class="node-title">Local Git Object Database</text>
  <text x="865" y="995" class="node-sub">code and session context are both commits, trees, blobs, and refs</text>

  <!-- Hosted platform -->

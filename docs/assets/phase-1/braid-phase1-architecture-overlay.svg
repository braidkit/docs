  <rect class="bg" width="1800" height="1160"/>

  <text x="60" y="70" class="title">Braid Phase 1 Architecture Overlay</text>
  <text x="60" y="108" class="subtitle">Phase 1 completes the local product loop; remote separation remains the target architecture.</text>

  <!-- Implementation legend -->
  <rect x="970" y="22" width="775" height="108" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.1"/>
  <text x="995" y="46" class="note-title">Implementation status</text>

  <rect x="995" y="57" width="24" height="18" rx="5" class="status-existing"/>
  <text x="1030" y="71" class="legend-text">Existing</text>
  <rect x="1135" y="57" width="24" height="18" rx="5" class="status-partial"/>
  <text x="1170" y="71" class="legend-text">Partially implemented</text>
  <rect x="1365" y="57" width="24" height="18" rx="5" class="status-phase1"/>
  <text x="1400" y="71" class="legend-text">Build in Phase 1</text>

  <rect x="995" y="91" width="24" height="18" rx="5" class="status-open"/>
  <text x="1030" y="105" class="legend-text">Open decision</text>
  <rect x="1175" y="91" width="24" height="18" rx="5" class="status-later"/>
  <text x="1210" y="105" class="legend-text">Later architecture</text>
  <rect x="1385" y="91" width="24" height="18" rx="5" class="status-external"/>
  <text x="1420" y="105" class="legend-text">External platform or actor</text>

  <!-- Zones -->
  <rect x="50" y="150" width="1085" height="835" rx="22" class="zone-local"/>
  <text x="85" y="195" class="zone-title">Local Dev Box</text>
  <text x="85" y="222" class="zone-sub">Before PR: local Inbox and SQLite are the working source of truth.</text>

  <rect x="1195" y="150" width="550" height="500" rx="22" class="zone-remote"/>
  <text x="1230" y="195" class="zone-title">Remote Server</text>
  <text x="1230" y="222" class="zone-sub">After PR: Intent DB becomes the durable source of truth.</text>

  <rect x="1195" y="700" width="550" height="285" rx="22" class="zone-github"/>
  <text x="1230" y="745" class="zone-title">GitHub</text>
  <text x="1230" y="772" class="zone-sub">PR, merge, and pushed Git note refs live here.</text>

  <!-- Local nodes -->
  <rect x="95" y="260" width="185" height="82" rx="14" class="node-user status-external"/>
  <text x="187.5" y="296" class="node-title">User</text>
  <text x="187.5" y="321" class="node-sub">starts work</text>

  <rect x="350" y="260" width="205" height="82" rx="14" class="node-worker status-phase1"/>
  <text x="452.5" y="294" class="node-title">Install Packages</text>
  <text x="452.5" y="319" class="node-sub">platform matrix open</text>

  <rect x="95" y="390" width="430" height="285" rx="18" class="agent-box status-partial"/>
  <text x="125" y="430" class="zone-title">Agent Runtime</text>
  <text x="125" y="454" class="zone-sub">Claude Code and Codex adapters only</text>
  <text x="125" y="477" class="zone-sub">normalized to the same WorkEvent model.</text>

  <rect x="130" y="495" width="165" height="78" rx="13" class="node-agent status-partial"/>
  <text x="212.5" y="530" class="node-title">Agent Adapters</text>
  <text x="212.5" y="555" class="node-sub">Claude + Codex</text>

  <rect x="330" y="495" width="150" height="78" rx="13" class="node-hook status-open"/>
  <text x="405" y="530" class="node-title">Hooks</text>
  <text x="405" y="555" class="node-sub">lifecycle events</text>

  <rect x="210" y="598" width="210" height="58" rx="13" class="node-skill status-open"/>
  <text x="315" y="625" class="node-title">Braid Skills</text>
  <text x="315" y="647" class="node-sub">depends on hooks/note design</text>

  <rect x="95" y="760" width="390" height="95" rx="15" class="node-agent status-phase1"/>
  <text x="290" y="797" class="node-title">Developer Review UI</text>
  <text x="290" y="822" class="node-sub">session progress, evidence, decisions</text>
  <text x="290" y="844" class="node-sub">design open; UI + backend are Phase 1</text>

  <rect x="635" y="260" width="215" height="85" rx="14" class="node-cli status-partial"/>
  <text x="742.5" y="297" class="node-title">Braid CLI</text>
  <text x="742.5" y="322" class="node-sub">complete #24 lifecycle</text>

  <rect x="610" y="425" width="315" height="95" rx="15" class="node-daemon status-partial"/>

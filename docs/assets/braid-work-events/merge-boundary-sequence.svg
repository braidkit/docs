      <text x="603" y="1652" text-anchor="start" font-size="15" font-weight="500" fill="#334155"><tspan x="603" dy="0">If head SHA changed during merge, restart PR loop</tspan><tspan x="603" dy="19">instead of promoting stale state.</tspan></text>

      <text x="82" y="1552" text-anchor="start" font-size="15" font-weight="500" fill="#334155"><tspan x="82" dy="0">Inbox is append-only and dedupes by</tspan><tspan x="82" dy="19">client_event_id before attach.</tspan></text>
    </g>
  

    <g>

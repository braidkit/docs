      <text x="1926" y="1552" text-anchor="start" font-size="15" font-weight="500" fill="#334155"><tspan x="1926" dy="0">Commit boundary never promotes; it only</tspan><tspan x="1926" dy="19">records reviewable local evidence.</tspan></text>
